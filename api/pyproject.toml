[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]

# SQLAlchemy ORM uses string-based forward references in relationship() type
# annotations (e.g. Mapped["Patient"]).  These are resolved by SQLAlchemy at
# runtime and are NOT undefined names, but ruff F821 cannot distinguish them
# from genuine missing names, so we suppress F821 in model files only.
[tool.ruff.lint.per-file-ignores]
"models/*.py" = ["F821"]
# _test_imports.py intentionally imports modules only to verify they load;
# all names are unused by design, so suppress F401 for this file.
"_test_imports.py" = ["F401"]
