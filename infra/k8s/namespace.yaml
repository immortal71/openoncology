apiVersion: v1
kind: Namespace
metadata:
  name: openoncology
  labels:
    name: openoncology
    # Pod Security Standards — restricted profile enforced
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# RBAC: OpenOncology service account — no cluster-wide permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openoncology-role
  namespace: openoncology
rules:
  - apiGroups: [""]
    resources: [configmaps, secrets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openoncology-rolebinding
  namespace: openoncology
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openoncology-role
subjects:
  - kind: ServiceAccount
    name: openoncology
    namespace: openoncology
---
# Network Policy: default deny-all, then allow only necessary traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: openoncology
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: openoncology
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: keycloak
      ports:
        - port: 8080
    # External HTTPS (Resend, Stripe, OncoKB, OpenTargets, ChEMBL, AlphaFold)
    - ports:
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-ingress
  namespace: openoncology
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: web
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - ports:
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-workers-egress
  namespace: openoncology
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: openoncology-workers
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: redis
      ports:
        - port: 6379
    - ports:
        - port: 443
