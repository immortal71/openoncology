apiVersion: apps/v1
kind: Deployment
metadata:
  name: openoncology-api
  namespace: openoncology
  labels:
    app.kubernetes.io/name: openoncology
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
spec:
  # replicas managed by HPA — this sets the initial/floor count
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # zero-downtime deploys
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openoncology
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: openoncology
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/openoncology/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          # ── Security context ──────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          # ── Health probes ─────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # ── Resource limits ────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # ── Config ────────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: openoncology-config
            - secretRef:
                name: openoncology-secrets
          # Writable tmpfs for uvicorn temp files / PIL cache etc.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-cache
          emptyDir: {}
      # Spread replicas across availability zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: api
