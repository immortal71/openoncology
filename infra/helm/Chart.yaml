apiVersion: v2
name: openoncology
description: Open-source precision cancer medicine platform
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - oncology
  - genomics
  - cancer
  - AI
  - drug-repurposing

maintainers:
  - name: OpenOncology Team
    email: ops@openoncology.org

dependencies:
  - name: postgresql
    version: "15.5.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
