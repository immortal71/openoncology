apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openoncology.fullname" . }}-keycloak
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openoncology.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      {{- include "openoncology.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        {{- include "openoncology.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          args: ["start", "--optimized"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://{{ include "openoncology.fullname" . }}-postgres:5432/{{ .Values.postgresql.auth.database }}
            - name: KC_DB_USERNAME
              value: {{ .Values.postgresql.auth.username }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: {{ .Values.postgresql.auth.secretKeys.userPasswordKey }}
            - name: KC_HOSTNAME
              value: {{ .Values.ingress.hosts.keycloak }}
            - name: KC_PROXY
              value: edge
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretRef }}
                  key: admin-username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretRef }}
                  key: admin-password
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openoncology.fullname" . }}-keycloak
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openoncology.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    {{- include "openoncology.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
