name: Security Scan

on:
  schedule:
    # Run weekly on Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF to GitHub Security tab

jobs:
  # ── Python dependency audit ───────────────────────────────────────────────
  dependency-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --format=cyclonedx-json -o pip-audit-results.json
        continue-on-error: true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: api/pip-audit-results.json

  # ── npm audit ─────────────────────────────────────────────────────────────
  npm-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: npm audit
        run: npm audit --audit-level=critical

  # ── Bandit static analysis (Python SAST) ─────────────────────────────────
  bandit:
    name: Bandit SAST (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[sarif]

      - name: Run bandit
        run: bandit -r . --exclude ./tests -f sarif -o bandit-results.sarif
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api/bandit-results.sarif
          category: bandit

  # ── Semgrep SAST ──────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (OWASP Top 10 ruleset)
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/typescript \
            --sarif \
            --output semgrep.sarif
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── OWASP ZAP baseline scan ───────────────────────────────────────────────
  zap-scan:
    name: OWASP ZAP API baseline scan
    runs-on: ubuntu-latest
    needs: []   # Run independently — API starts in Docker

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openoncology
          POSTGRES_PASSWORD: zaptestpassword
          POSTGRES_DB: openoncology
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t openoncology-api:zap ./api

      - name: Start API
        run: |
          docker run -d \
            --name api \
            --network host \
            -e DATABASE_URL="postgresql+asyncpg://openoncology:zaptestpassword@localhost:5432/openoncology" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e SECRET_KEY="zap-test-secret" \
            -e ENVIRONMENT="development" \
            -p 8000:8000 \
            openoncology-api:zap \
            uvicorn main:app --host 0.0.0.0 --port 8000

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          rules_file_name: infra/zap/rules.tsv
          cmd_options: "-a -j"
          fail_action: false   # Report only — don't fail CI (review manually)

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

  # ── Trivy container scan ───────────────────────────────────────────────────
  trivy:
    name: Trivy container vulnerability scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t openoncology-api:trivy ./api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "openoncology-api:trivy"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
