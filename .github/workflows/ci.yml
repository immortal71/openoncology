name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  lint-frontend:
    name: Frontend lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

  # ── Backend ───────────────────────────────────────────────────────────────
  lint-backend:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint deps
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openoncology
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: openoncology_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]

    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL: postgresql+asyncpg://openoncology:testpassword@localhost:5432/openoncology_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Docker build check ────────────────────────────────────────────────────
  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-frontend, test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t openoncology-api:ci ./api

      - name: Build web image
        run: docker build -t openoncology-web:ci ./web
